name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write # Required for keyless signing with Sigstore

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/vitistack/viti-crd-conversion-webhook
  HELM_REGISTRY: ghcr.io/vitistack/helm

jobs:
  # Build OCI images for multiple architectures using native runners
  build-image:
    name: Build Image (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.webhook
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Package Helm chart
  package-helm:
    name: Package Helm Chart
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0

      - name: Extract version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate CRDs and Artifacts
        run: |
          make generate
          make verify-crds
          make gen-crds-yaml

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update chart versions
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          yq -i ".version = \"${VERSION}\"" charts/vitistack-crds/Chart.yaml
          yq -i ".appVersion = \"${VERSION}\"" charts/vitistack-crds/Chart.yaml
          yq -i ".conversionWebhook.image.tag = \"${VERSION}\"" charts/vitistack-crds/values.yaml

      - name: Package Helm chart
        run: helm package charts/vitistack-crds

      - name: Upload chart artifact
        uses: actions/upload-artifact@v7
        with:
          name: helm-chart
          path: crds-*.tgz
          retention-days: 1

      - name: Upload crds.yaml artifact
        uses: actions/upload-artifact@v7
        with:
          name: crds-yaml
          path: crds.yaml
          retention-days: 1

  # Publish and sign
  publish-and-sign:
    name: Publish & Sign
    needs: [build-image, package-helm]
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Download Helm chart
        uses: actions/download-artifact@v8
        with:
          name: helm-chart
          path: /tmp/helm

      - name: Download crds.yaml
        uses: actions/download-artifact@v8
        with:
          name: crds-yaml
          path: .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Push Helm chart
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u "${{ github.actor }}" --password-stdin
          helm push /tmp/helm/crds-*.tgz oci://${{ env.HELM_REGISTRY }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container image
        run: cosign sign --yes ${{ env.IMAGE_NAME }}:${{ needs.package-helm.outputs.version }}

      - name: Sign Helm chart
        run: cosign sign --yes ${{ env.HELM_REGISTRY }}/crds:${{ needs.package-helm.outputs.version }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Check if release already exists
          if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists, uploading assets..."
            gh release upload "${{ github.ref_name }}" crds.yaml --clobber --repo "${{ github.repository }}"
          else
            echo "Creating new release ${{ github.ref_name }}..."
            gh release create "${{ github.ref_name }}" crds.yaml \
              --repo "${{ github.repository }}" \
              --generate-notes \
              --latest
          fi
