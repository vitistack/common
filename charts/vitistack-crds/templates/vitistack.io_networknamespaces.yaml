---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: networknamespaces.vitistack.io
spec:
  group: vitistack.io
  names:
    kind: NetworkNamespace
    listKind: NetworkNamespaceList
    plural: networknamespaces
    shortNames:
    - nn
    singular: networknamespace
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.clusterIdentifier
      name: Name
      type: string
    - jsonPath: .spec.datacenterIdentifier
      name: DatacenterIdentifier
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.status
      name: Status
      type: string
    - description: Creation Timestamp
      jsonPath: .status.created
      name: Created
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: NetworkNamespace is the Schema for the NetworkNamespace API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              datacenterIdentifier:
                maxLength: 32
                minLength: 2
                pattern: ^[A-Za-z0-9_-]+$
                type: string
              ipAllocation:
                description: |-
                  IPAllocation defines how IP addresses are allocated within this NetworkNamespace.
                  When not set, the default behavior is DHCP-based allocation (backward compatible
                  with existing nms-operator + kea-operator flow).
                properties:
                  dhcp:
                    description: DHCP contains optional configuration overrides for
                      DHCP-based allocation.
                    properties:
                      requireClientClasses:
                        description: |-
                          RequireClientClasses specifies Kea DHCP client classes that must be
                          matched for lease allocation.
                        items:
                          type: string
                        type: array
                    type: object
                  provider:
                    description: |-
                      Provider identifies the operator or system that implements the allocation.
                      Examples: "kea" (Kea DHCP server), "static-ip-operator" or others
                      When empty, the default provider for the type is assumed.
                    maxLength: 32
                    pattern: ^[A-Za-z0-9_-]+$
                    type: string
                  static:
                    description: |-
                      Static contains the IP pool configuration for static allocation.
                      Required when type is "static".
                    properties:
                      dns:
                        description: DNS is a list of DNS server addresses to use
                          for machines in this pool.
                        items:
                          type: string
                        type: array
                      ipv4CIDR:
                        description: IPv4CIDR is the subnet in CIDR notation (e.g.
                          "10.0.1.0/24").
                        pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}$
                        type: string
                      ipv4Gateway:
                        description: IPv4Gateway is the default gateway address for
                          the subnet (e.g. "10.0.1.1").
                        type: string
                      ipv4RangeEnd:
                        description: |-
                          IPv4RangeEnd is the last allocatable IP address in the range.
                          If not set, defaults to the last usable address in the CIDR (e.g. x.x.x.254 for a /24).
                        type: string
                      ipv4RangeStart:
                        description: |-
                          IPv4RangeStart is the first allocatable IP address in the range.
                          If not set, defaults to the second usable address in the CIDR (e.g. x.x.x.2).
                        type: string
                      ttlSeconds:
                        default: 3600
                        description: |-
                          TTLSeconds is the time-to-live for IP allocations in seconds.
                          After this period, unused allocations may be reclaimed by the operator.
                        minimum: 60
                        type: integer
                      vlanId:
                        description: |-
                          VlanID is the VLAN ID for the subnet. When set, the kubevirt-operator
                          creates a NetworkAttachmentDefinition with this VLAN tag so VMs are
                          placed on the correct network segment. When 0 or unset, VMs use the
                          default pod network.
                        maximum: 4094
                        minimum: 0
                        type: integer
                    required:
                    - ipv4CIDR
                    - ipv4Gateway
                    type: object
                  type:
                    allOf:
                    - enum:
                      - dhcp
                      - static
                    - enum:
                      - dhcp
                      - static
                    description: |-
                      Type specifies the IP allocation method to use.
                      "dhcp" uses an external DHCP server for address assignment.
                      "static" uses a static IP operator to allocate from a defined range.
                    type: string
                required:
                - type
                type: object
              supervisorIdentifier:
                maxLength: 32
                minLength: 2
                pattern: ^[A-Za-z0-9_-]+$
                type: string
            required:
            - datacenterIdentifier
            - supervisorIdentifier
            type: object
          status:
            properties:
              associatedKubernetesClusterIds:
                items:
                  type: string
                type: array
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              created:
                format: date-time
                type: string
              datacenterIdentifier:
                type: string
              ipAllocationStatus:
                description: |-
                  IPAllocationStatus reports the current state of IP allocation
                  within this NetworkNamespace.
                properties:
                  allocatedCount:
                    description: AllocatedCount is the number of IP addresses currently
                      allocated.
                    type: integer
                  allocatedIPs:
                    description: |-
                      AllocatedIPs lists each currently allocated IP along with the
                      NetworkConfiguration that owns it.
                    items:
                      description: AllocatedIPEntry records a single IP allocation
                        and the resource that owns it.
                      properties:
                        ip:
                          description: IP is the allocated IPv4 address.
                          type: string
                        networkConfiguration:
                          description: NetworkConfiguration is the name of the NetworkConfiguration
                            that owns this allocation.
                          type: string
                      required:
                      - ip
                      - networkConfiguration
                      type: object
                    type: array
                  availableCount:
                    description: AvailableCount is the number of IP addresses available
                      for allocation.
                    type: integer
                  provider:
                    description: Provider is the operator or system that performed
                      the allocation.
                    type: string
                  totalCount:
                    description: TotalCount is the total number of IP addresses in
                      the pool.
                    type: integer
                  type:
                    description: Type is the active IP allocation type.
                    enum:
                    - dhcp
                    - static
                    type: string
                type: object
              ipv4EgressIp:
                type: string
              ipv4Prefix:
                type: string
              ipv6EgressIp:
                type: string
              ipv6Prefix:
                type: string
              message:
                type: string
              namespaceId:
                type: string
              observedGeneration:
                type: integer
              phase:
                type: string
              retryCount:
                type: integer
              status:
                type: string
              supervisorIdentifier:
                type: string
              vlanId:
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
