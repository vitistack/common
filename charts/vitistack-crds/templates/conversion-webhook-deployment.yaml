{{- if .Values.conversionWebhook.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vitistack-crds.name" . }}-conversion-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vitistack-crds.labels" . | nindent 4 }}
    app.kubernetes.io/component: conversion-webhook
spec:
  replicas: {{ .Values.conversionWebhook.replicas }}
  selector:
    matchLabels:
      {{- include "vitistack-crds.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: conversion-webhook
  template:
    metadata:
      labels:
        {{- include "vitistack-crds.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: conversion-webhook
    spec:
      serviceAccountName: {{ include "vitistack-crds.name" . }}-conversion-webhook
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: webhook
          image: "{{ .Values.conversionWebhook.image.repository }}:{{ .Values.conversionWebhook.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.conversionWebhook.image.pullPolicy }}
          args:
            - --port={{ .Values.conversionWebhook.port }}
            - --cert-dir=/tmp/k8s-webhook-server/serving-certs
          ports:
            - name: https
              containerPort: {{ .Values.conversionWebhook.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.conversionWebhook.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: cert
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
      volumes:
        - name: cert
          secret:
            secretName: {{ include "vitistack-crds.name" . }}-conversion-webhook-cert
            defaultMode: 420
{{- end }}
